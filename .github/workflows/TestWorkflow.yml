name: TestWorkflow
run-name: "TestWorkflow"
on:
  workflow_dispatch:
    inputs:
      counter:
        type: number
        default: 0

env:
  COUNTER: 42

jobs:
  Setup:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/asterisk/asteriskci-agent-rocky8:latest
    steps:
      - name: DumpEnv
        env:
          GH_TOKEN: ${{secrets.ASTERISKTEAM_PAT}}
          FPBX_ISSUE_REPO: 'freepbx/github-integration-test'
          ASTERISK_VERSION: '21.4.1'
        run: |
          mount
          echo "PWD:"
          pwd
          ls -al
          echo "PRINTENV:"
          printenv


