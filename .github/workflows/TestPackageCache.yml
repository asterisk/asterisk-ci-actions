name: TestPackageCache
run-name: "TestPackageCache"
on:
  workflow_dispatch:
    inputs:
      cache_key:
        description: "Cache Key"
        required:    false
        type:        string

permissions:
  actions: write
  checks: read
  contents: write
  issues: read
  pull-requests: write
  statuses: read

env:
  CACHE_KEY: ${{ inputs.cache_key }}

jobs:
  Job1:
    runs-on: ubuntu-latest
    steps:
#      - name: PreSetup
#        run: |
#          echo "::group::/var/lib/apt/lists"
#          ls -al /var/lib/apt/lists
#          echo "::endgropup::"
#          for d in alternatives info triggers ; do
#            echo "::group::dpkg ${d}"
#            ls -al /var/lib/dpkg/${d}
#            echo "::endgropup::"
#          done

      - name: PackageSetup
        if: ${{ inputs.cache_key == '' }}
        uses: asterisk/cache-apt-pkgs-action@master-combined-fixes-test
        with:
          packages: >-
            build-essential gdb binutils-dev freetds-dev
            libasound2-dev libbluetooth-dev libc-client2007e-dev
            xmlstarlet python3-pystache python3-mako
            python3-pip alembic odbc-postgresql unixodbc unixodbc-dev
            python3-psycopg2
            python3-markdown python3-markdown-*
          execute_install_scripts: true
#          no_install_recommends: true
#          no_upgrade: true
          version: 1.0
          debug: false

      - id: load-cache
        if: ${{ env.CACHE_KEY }}
        uses: actions/cache/restore@v5
        with:
          path: ~/cache-apt-pkgs
          key: cache-apt-pkgs_${{ env.CACHE_KEY }}

      - name: PostSetup
        run: |
          cp /etc/odbc.ini ~/cache-apt-pkgs/
          cp /etc/odbcinst.ini ~/cache-apt-pkgs/
          cp /var/lib/dpkg/status ~/cache-apt-pkgs/
          tar -czf ~/cache-apt-pkgs.tar.gz -C ~ cache-apt-pkgs

      - id: upload-tarball
        if: ${{ env.CACHE_KEY }}
        uses: actions/upload-artifact@v7
        with:
          name: cache-apt-pkgs-tarball_${{ env.CACHE_KEY }}
          path: ~/cache-apt-pkgs.tar.gz
          archive: false

