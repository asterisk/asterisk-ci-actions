name: TestPackageCache
run-name: "TestPackageCache"
on:
  workflow_dispatch:
    inputs:
      cache_key:
        description: "Cache Key"
        required:    false
        type:        string

permissions:
  actions: write
  checks: read
  contents: write
  issues: read
  pull-requests: write
  statuses: read

env:
  CACHE_KEY: ${{ inputs.cache_key }}

jobs:
  Job1:
    runs-on: ubuntu-latest
    steps:
      - name: PreSetup
        run: |
          echo "::group::/var/lib/apt/lists"
          ls -al /var/lib/apt/lists
          echo "::endgropup::"
          for d in alternatives info triggers ; do
            echo "::group::dpkg ${d}"
            ls -al /var/lib/dpkg/${d}
            echo "::endgropup::"
          done

      - name: PackageSetup
        if: ${{ inputs.cache_key == '' }}
        uses: asterisk/cache-apt-pkgs-action@master-combined-fixes-test
        with:
          packages: >-
            wget curl file apt-utils
            sudo build-essential gdb binutils-dev freetds-dev
            libasound2-dev libbluetooth-dev libc-client2007e-dev
            libcap-dev libcfg-dev libcodec2-dev libcorosync-common-dev
            libcpg-dev libcurl4-openssl-dev libedit-dev libfftw3-dev
            libgmime-3.0-dev libgsm1-dev libical-dev libiksemel-dev
            libjansson-dev libldap-dev libldap2-dev
            liblua5.2-dev libneon27-dev libnewt-dev libogg-dev libpopt-dev
            libradcli-dev libresample1-dev libsndfile1-dev libsnmp-dev
            libspandsp-dev libspeex-dev libspeexdsp-dev libsrtp2-dev
            libunbound-dev liburiparser-dev libvorbis-dev libxslt1-dev
            xmlstarlet python3-pystache sqlite3 sqlite3-tools
            libsqlite3-dev cmake libsctp-dev libgsl-dev python3-dev python3-venv
            postgresql libpq-dev git libpcap-dev nano python3-pip
            alembic odbc-postgresql unixodbc unixodbc-dev
            python3-psycopg2 rsync
            python3-markdown python3-markdown-*
          execute_install_scripts: true
          no_install_recommends: true
          no_upgrade: true
          version: 1.0
          debug: true

      - id: load-cache
        if: ${{ env.CACHE_KEY }}
        uses: actions/cache/restore@v5
        with:
          path: ~/cache-apt-pkgs
          key: cache-apt-pkgs_${{ env.CACHE_KEY }}

      - name: PostSetup
        run: |
          tar -czf ~/cache-apt-pkgs.tar.gz -C ~ cache-apt-pkgs
          
      - id: upload-tarball
        if: ${{ env.CACHE_KEY }}
        uses: actions/upload-artifact@v7
        with:
          name: cache-apt-pkgs-tarball_${{ env.CACHE_KEY }}
          path: ~/cache-apt-pkgs.tar.gz
          archive: false

