name: 'RAUT'
on:
  workflow_call:
    inputs:
      asterisk_repo:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      base_branch:
        required: true
        type: string
      is_cherry_pick:
        required: false
        type: boolean
        default: false
      build_script:
        required: false
        type: string
        default: "buildAsterisk.sh"
      build_options:
        required: false
        type: string
        default: ""
      modules_blacklist:
        description: 'List of Asterisk modules to blacklist from the build'
        type: string
        default: ""
        required: false
      unittest_command:
        type: string
        required: true

jobs:
  RunUnitTests:
    name: UnitTests ${{ inputs.base_branch }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/asterisk/asteriskci-agent-rocky8:latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Restore Asterisk Cache
        uses: actions/cache/restore@v4
        with:
          path: build-cache
          key: ${{github.workflow}}-${{inputs.pr_number}}-${{inputs.base_branch}}
              
      - name: Setup
        env:
          GH_TOKEN: ${{secrets.TOKEN}}
          GITHUB_TOKEN: ${{secrets.TOKEN}}
          ASTERISK_REPO: ${{inputs.asterisk_repo}}
          CACHE_DIR: cache
          BASE_BRANCH: ${{ inputs.base_branch }}
          IS_CHERRY_PICK: ${{ inputs.is_cherry_pick }}
          PR_NUMBER: ${{ inputs.pr_number }}
          BUILD_SCRIPT: ${{ inputs.build_script }}
          BUILD_OPTIONS: ${{ inputs.build_options }}
          MODULES_BLACKLIST: ${{ inputs.modules_blacklist }}
        run: |
          id
          BASE_BRANCH="${{inputs.base_branch}}"
          UNIT_TEST_NAME="unittests-${BASE_BRANCH//\//-}"
          echo "UNIT_TEST_NAME=${UNIT_TEST_NAME}" >> "${GITHUB_ENV}"
          export GITHUB_ACTION_REPOSITORY=asterisk/asterisk-ci-actions
          export ACTION_DIR=$(basename ${GITHUB_ACTION_REPOSITORY})
          export SCRIPT_DIR=${GITHUB_WORKSPACE}/${ACTION_DIR}/scripts
          export REPO_DIR=$(basename ${ASTERISK_REPO})
          export OUTPUT_DIR=${GITHUB_WORKSPACE}/${CACHE_DIR}/output
          cd ${GITHUB_WORKSPACE}
          ls -al
          
          echo "*** Cloning ${GITHUB_ACTION_REPOSITORY}"
          git clone ${GITHUB_SERVER_URL}/${GITHUB_ACTION_REPOSITORY}
          git -C ${ACTION_DIR} checkout main-cache-builds
          mkdir -p ${OUTPUT_DIR}
          cd build-cache
          sudo rsync -vaH . /
          chown -R asteriskci:users /etc/asterisk /var/{cache,lib,log,spool}/asterisk

      - name: Setup
        env:
          GH_TOKEN: ${{secrets.TOKEN}}
          GITHUB_TOKEN: ${{secrets.TOKEN}}
          CACHE_DIR: cache
          BASE_BRANCH: ${{ inputs.base_branch }}
          PR_NUMBER: ${{ inputs.pr_number }}
          UNITTEST_COMMAND: ${{ inputs.unittest_command }}
        run: |
          UNIT_TEST_NAME="unittests-${BASE_BRANCH//\//-}"
          echo "UNIT_TEST_NAME=${UNIT_TEST_NAME}" >> "${GITHUB_ENV}"
          export GITHUB_ACTION_REPOSITORY=asterisk/asterisk-ci-actions
          export ACTION_DIR=$(basename ${GITHUB_ACTION_REPOSITORY})
          export SCRIPT_DIR=${GITHUB_WORKSPACE}/${ACTION_DIR}/scripts
          export OUTPUT_DIR=${GITHUB_WORKSPACE}/${CACHE_DIR}/output

          cd ${GITHUB_WORKSPACE}
          ${SCRIPT_DIR}/runAsteriskUnitTests.sh --no-expect --github \
            --user-group=asteriskci:users \
            --output-dir=${OUTPUT_DIR} \
            --output-xml=${OUTPUT_DIR}/unittests-results.xml \
            --unittest-command="${UNITTEST_COMMAND}"

      - name: Save Output
        id: save-output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{env.UNIT_TEST_NAME}}
          path: cache/output

