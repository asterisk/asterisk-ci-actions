name: AsteriskBuildAndCache
on:
  workflow_call:
    inputs:
      test_type:
        description: 'nightly, prstatechange, prrecheck, cherry-pick'
        required: true
        type: string
      asterisk_repo:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      base_branch:
        required: true
        type: string
      is_cherry_pick:
        required: false
        type: boolean
        default: false
      build_script:
        required: false
        type: string
        default: "buildAsterisk.sh"
      build_options:
        required: false
        type: string
        default: ""
      modules_blacklist:
        description: 'List of Asterisk modules to blacklist from the build'
        type: string
        default: ""
        required: false
    secrets:
      TOKEN:
        required: true

jobs:
  BuildAndCacheAsterisk:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/asterisk/asteriskci-agent-rocky8:latest
    services:
      postgres-asterisk:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        shell: bash
    steps:
      - name: DumpEnvironment
        uses: asterisk/asterisk-ci-actions/DumpEnvironmentAction@main
    
#      - name: SetupUbuntuRunner
#        uses: asterisk/asterisk-ci-actions/SetupUbuntuRunner@main

      - name: BuildAsterisk
        env:
          GH_TOKEN: ${{secrets.TOKEN}}
          GITHUB_TOKEN: ${{secrets.TOKEN}}
          GITHUB_ACTION_REPOSITORY: asterisk/asterisk-ci-actions
          ASTERISK_REPO: ${{inputs.asterisk_repo}}
          BASE_BRANCH: ${{ inputs.base_branch }}
          IS_CHERRY_PICK: ${{ inputs.is_cherry_pick }}
          PR_NUMBER: ${{ inputs.pr_number }}
          BUILD_SCRIPT: ${{ inputs.build_script }}
          BUILD_OPTIONS: ${{ inputs.build_options }}
          MODULES_BLACKLIST: ${{ inputs.modules_blacklist }}
        run: |
          id
          export GITHUB_ACTION_REPOSITORY=asterisk/asterisk-ci-actions
          export ACTION_DIR=$(basename ${GITHUB_ACTION_REPOSITORY})
          export SCRIPT_DIR=${GITHUB_WORKSPACE}/${ACTION_DIR}/scripts
          export REPO_DIR=$(basename ${ASTERISK_REPO})
          export CACHE_DIR=${GITHUB_WORKSPACE}/cache
          export OUTPUT_DIR=${CACHE_DIR}/output
          cd ${GITHUB_WORKSPACE}
          
          echo "*** Cloning ${GITHUB_ACTION_REPOSITORY}"
          git clone ${GITHUB_SERVER_URL}/${GITHUB_ACTION_REPOSITORY}
          git -C ${ACTION_DIR} checkout main-cache-builds
          mkdir -p ${REPO_DIR}
          mkdir -p ${CACHE_DIR}
          mkdir -p ${OUTPUT_DIR}
          mkdir build-cache
          
          echo "*** Checking out ${ASTERISK_REPO}"
          ${SCRIPT_DIR}/checkoutRepo.sh --repo=${ASTERISK_REPO} \
            --branch=${BASE_BRANCH} --is-cherry-pick=${IS_CHERRY_PICK} \
            --pr-number=${PR_NUMBER} --destination=${REPO_DIR}
          
          cd ${REPO_DIR}
          echo "*** Starting build"
          ${SCRIPT_DIR}/${BUILD_SCRIPT} --github --branch-name=${BASE_BRANCH} \
            --ccache-disable ${BUILD_OPTIONS} \
            --modules-blacklist="${MODULES_BLACKLIST// /}" \
            --output-dir=${OUTPUT_DIR} \
            --cache-dir=${CACHE_DIR}
          echo "*** Build Complete"
          
          echo "*** Installing"
          make DESTDIR=${GITHUB_WORKSPACE}/build-cache install
          make DESTDIR=${GITHUB_WORKSPACE}/build-cache samples
          make DESTDIR=${GITHUB_WORKSPACE}/build-cache install-headers
          echo "*** Install Complete"
          
          echo "*** Deleting old cache (if any): ${{github.workflow}}-${{inputs.pr_number}}-${{inputs.base_branch}}"
          gh cache delete ${{github.workflow}}-${{inputs.pr_number}}-${{inputs.base_branch}} || :

      - id: cache-build-output
        uses: actions/cache/save@v4
        with:
          path: build-cache
          key: ${{github.workflow}}-${{inputs.pr_number}}-${{inputs.base_branch}}
