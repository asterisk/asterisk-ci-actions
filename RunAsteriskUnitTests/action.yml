    - name: Save Output
      if: ${{ always() }}
      uses: actions/upload-artifact@v3
      with:
        name: Test Results
        path: ./tests/CI/output

    - name: Publish Test Results
      uses: /asterisk/asterisk-ci-actions/publish-unit-test-result-action/composite@main
#        uses: EnricoMi/publish-unit-test-result-action/composite@v2.4.2
      with:
        check_name: Unit Test Results
        commit: ${{ inputs.pr-sha }}
        files: tests/CI/output/*.xml
